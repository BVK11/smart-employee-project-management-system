version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: employee_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: pandu@123
      MYSQL_DATABASE: employee_management

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppandu@123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./employee-management-backend

    container_name: employee_backend

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/employee_management
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: pandu@123

  frontend:
    build:
      context: ./employee-management-frontend

    container_name: employee_frontend

    depends_on:
      - backend

    ports:
      - "5173:5173"

    command: >
      sh -c "
      npm run dev -- --host &
      PID=$!;
      sleep 5;
      echo '';
      echo '=========================================';
      echo ' Frontend is available at:';
      echo ' http://localhost:5173';
      echo '=========================================';
      wait $PID
      "

volumes:
  mysql_data: