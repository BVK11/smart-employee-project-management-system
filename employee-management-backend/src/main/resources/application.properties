spring.application.name=employee-management-backend

# ===============================
# DATABASE
# ===============================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# DATA INITIALIZATION
# ===============================

spring.sql.init.mode=never

# ===============================
# SERVER
# ===============================

server.port=8080

# ===============================
# JWT
# ===============================

jwt.secret=MySuperSecretKeyForEmployeeManagementProject2026JwtSecretKey123456789
jwt.expiration=86400000


# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
